<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization</title>
    <link href="organization.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="side-bar">
            <div class="logo">
                <span>ACB</span>
            </div>
            <div class="nav-menu">
                <a href="../dashboard/dashboard.html" class="nav-item">Home</a>
                <a href="#" class="nav-item active">Organization</a>
                <a href="../dashboard/dashboard.html#cards" class="nav-item">Cards</a>
                <a href="../dashboard/profile.html" class="nav-item">Profile</a>
            </div>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>
        <div class="main">
            <div class="header">
                <div class="welcome-message">
                    <h1 id="organization-name">Organization</h1>
                </div>
            </div>
            <div class="content">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-info">
                            <h3>Balance: </h3>
                            <p class="stat-value" id="balance">0</p>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-info">
                            <h3>Members: </h3>
                            <p class="stat-value" id="members"></p>
                        </div>
                    </div>
                </div>
                <div class="transactions">
                    <div class="transaction-header">
                        <h2>Recent Transactions</h2>
                        <button class="view-all-btn" id="view-all-btn">View all</button>
                    </div>
                    <div class="recent-transactions" id="recent-transactions">
                        <div class="loading">Loading transactions ..</div>
                    </div>
                    <div class="donate">
                        <button class="donate-btn" id="donate-btn">Donate</button>
                        <button class="transfer-btn" id="transfer-btn">Transfer Between Accounts</button>
                    </div>
                </div>
                <div id="error-state" class="error-container" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>Organization Not Found</h2>
                    <p>The organization you're looking for doesn't exist or you don't have access to it.</p>
                    <a href="../dashboard/dashboard.html" class="back-btn">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
    <div id="add-transaction-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Transaction</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="transaction-amount" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="transaction-description" placeholder="Transaction description">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel">Cancel</button>
                <button class="btn-submit" id="create-transaction">Create Transaction</button>
            </div>
        </div>
    </div>
    <div id="transfer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Transfer Money</h3>
                <button class="close-modal close-transfer-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="transfer-title" placeholder="e.g., Project funding, Reimbursement">
                </div>
                <div class="form-group">
                    <label>From Account (Sender)</label>
                    <select id="sender-account">
                        <option value="">Select account</option>
                        <option value="outside">Outside Bank</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>To Account (Receiver)</label>
                    <select id="receiver-account">
                        <option value="">Select account</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="transfer-amount" placeholder="0.00" step="0.01" min="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel close-transfer-modal">Cancel</button>
                <button class="btn-submit" id="confirm-transfer">Complete Transfer</button>
            </div>
        </div>
    </div>
    <script src="organization.js"></script>
</body>
</html>
